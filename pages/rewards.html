<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Rewards | CatchALift</title>

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/rewards.css" />
  </head>

  <body>
    <main class="rewards-page">
      <section class="hero-card">
        <div class="reward-icon">🎉</div>

        <h1>Congratulations!</h1>

        <p class="points-earned">+50 CatchPoints Earned</p>

        <p class="tagline">Every Journey Feels Lighter</p>
      </section>

      <section class="balance-card">
        <h2>Your Rewards Wallet</h2>

        <div class="wallet-balance">1,250 CatchPoints</div>

        <div class="member-badge">⭐ Gold Member</div>
      </section>

      <section class="progress-card">
        <div class="progress-header">
          <span>Progress To Platinum</span>

          <span>80%</span>
        </div>

        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
      </section>

      <section class="referral-card">
        <h3>Invite Friends</h3>

        <p>Earn ₹100 Ride Credits For Every Referral</p>
      </section>

      <div class="action-buttons">
        <button
          class="gold-btn"
          onclick="window.location.href = 'ride-history.html'"
        >
          View Ride History
        </button>

        <button
          class="light-btn"
          onclick="window.location.href = 'dashboard.html'"
        >
          Back To Dashboard
        </button>
      </div>
    </main>

    <script src="../js/rewards.js"></script>
  </body>
</html>
