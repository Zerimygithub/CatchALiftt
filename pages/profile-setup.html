<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CatchALiftt | Choose Your Profile</title>

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Profile Setup CSS -->

    <link rel="stylesheet" href="../css/profile-setup.css" />
  </head>

  <body>
    <div class="profile-page">
      <!-- Background Effects -->

      <div class="bg-circle bg-circle-left"></div>

      <div class="bg-circle bg-circle-right"></div>

      <!-- Main Glass Card -->

      <main class="profile-card">
        <!-- ======================================================
                 BRAND
            ======================================================= -->

        <header class="brand">
          <img
            src="../assets/images/logo.png"
            alt="CatchALiftt"
            class="brand-logo"
          />
        </header>

        <!-- ======================================================
                 PROFILE FORM
            ======================================================= -->

        <form id="profileForm" class="profile-form" autocomplete="off">
          <div class="form-row">
            <!-- First Name -->

            <div class="form-group">
              <label for="firstName">
                First Name
                <span>*</span>
              </label>

              <input
                id="firstName"
                type="text"
                maxlength="25"
                autocomplete="given-name"
                placeholder="Enter your first name"
              />
            </div>

            <!-- Last Name -->

            <div class="form-group">
              <label for="lastName">
                Last Name
                <small>(Optional)</small>
              </label>

              <input
                id="lastName"
                type="text"
                maxlength="25"
                autocomplete="family-name"
                placeholder="Enter your last name"
              />
            </div>

            <!-- Gender -->

            <div class="form-group">
              <label>
                Gender
                <span>*</span>
              </label>

              <div id="genderSelector" class="gender-selector">
                <button
                  type="button"
                  class="gender-btn active"
                  data-gender="male"
                >
                  ♂ Male
                </button>

                <button type="button" class="gender-btn" data-gender="female">
                  ♀ Female
                </button>

                <button type="button" class="gender-btn" data-gender="neutral">
                  ◉ Other
                </button>
              </div>
            </div>
          </div>
        </form>

        <!-- ======================================================
                 PROFILE PANEL
            ======================================================= -->

        <section class="profile-section">
          <div class="profile-panel">
            <h2 class="profile-title">Choose Your Profile</h2>

            <div class="profile-gallery-container">
              <!-- Left Navigation -->

              <button
                type="button"
                id="profilePrev"
                class="gallery-arrow"
                aria-label="Previous Profile"
              >
                ❮
              </button>

              <!-- Profile Gallery -->

              <div id="profileGallery" class="profile-gallery">
                <!-- Profile Cards will be generated by profile-setup.js -->
              </div>

              <!-- Right Navigation -->

              <button
                type="button"
                id="profileNext"
                class="gallery-arrow"
                aria-label="Next Profile"
              >
                ❯
              </button>
            </div>

            <div class="selected-profile">
              <span> Selected Profile </span>

              <strong id="selectedProfileName"> None </strong>
            </div>
          </div>
        </section>

        <!-- ======================================================
                 ACTION SECTION
            ======================================================= -->

        <small id="profileError"></small>

        <button type="button" id="continueBtn" class="continue-btn" disabled>
          Continue
        </button>

        <!-- ======================================================
                 PRIVACY
            ======================================================= -->

        <div class="privacy-card">
          <div class="privacy-icon">🔒</div>

          <div class="privacy-text">
            <strong> Privacy First </strong>

            <p>Visible only after a ride is confirmed.</p>
          </div>
        </div>
      </main>
    </div>

    <!-- ======================================================
         JAVASCRIPT
    ======================================================= -->

    <script src="../js/storage.js"></script>

    <script src="../js/session.js"></script>

    <script src="../js/profile-setup.js"></script>
  </body>
</html>
