<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CatchALiftt Payment</title>

    <link rel="stylesheet" href="../css/payment.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script
      src="https://kit.fontawesome.com/a2d9d5a64f.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <div class="payment-page">
      <!-- NAVBAR -->

      <nav class="navbar">
        <div class="logo">CatchA<span>Liftt</span></div>

        <button class="secure-btn">
          <i class="fa-solid fa-shield"></i>
          Secure Payment
        </button>
      </nav>

      <!-- PAYMENT GRID -->

      <section class="payment-grid">
        <!-- LEFT -->

        <div class="left-panel glass">
          <h2>Trip Summary</h2>

          <div class="trip-row">
            <div>
              <small>Pickup</small>
              <h4>MG Road, Gurgaon</h4>
            </div>

            <div>
              <small>Drop</small>
              <h4>Cyber Hub, DLF Phase 2</h4>
            </div>
          </div>

          <div class="host-card">
            <img src="../assets/images/host-avatar.png" />

            <div>
              <h3>TED MOE</h3>

              <p>Host Verified ★ 4.9</p>
            </div>
          </div>

          <div class="fare-box">
            <small>Total Fare</small>

            <h1>₹120</h1>
          </div>

          <!-- CO2 -->

          <div class="co2-card">
            <div class="co2-left">
              <i class="fa-solid fa-leaf"></i>

              <div>
                <h3>CO₂ Saved</h3>

                <p>You helped reduce traffic pollution</p>
              </div>
            </div>

            <div class="co2-right">2.4 KG</div>
          </div>
        </div>

        <!-- RIGHT -->

        <div class="right-panel glass">
          <h2>Select Payment</h2>

          <div class="payment-method active">
            <div class="method-left">
              <div class="pay-icon gpay">G</div>

              <div>
                <h3>Google Pay</h3>

                <small>UPI Instant</small>
              </div>
            </div>

            <div class="radio active-radio"></div>
          </div>

          <div class="payment-method">
            <div class="method-left">
              <div class="pay-icon phonepe">P</div>

              <div>
                <h3>PhonePe</h3>

                <small>UPI Payment</small>
              </div>
            </div>

            <div class="radio"></div>
          </div>

          <div class="payment-method">
            <div class="method-left">
              <div class="pay-icon wallet">
                <i class="fa-solid fa-wallet"></i>
              </div>

              <div>
                <h3>CatchALiftt Wallet</h3>

                <small>Fast checkout</small>
              </div>
            </div>

            <div class="radio"></div>
          </div>

          <button class="pay-btn">Pay ₹120 Securely</button>
        </div>
      </section>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

    <script src="../js/payment.js"></script>
  </body>
</html>
