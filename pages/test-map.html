<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CatchALift Map Test</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"
    />

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }

      #map {
        height: 100vh;
        width: 100%;
        .leaflet-routing-container {
          display: none !important;

      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

    <script>
      const map = L.map("map").setView([12.9716, 77.5946], 13);

      L.tileLayer(
        "https://tiles.stadiamaps.com/tiles/alidade_smooth/{z}/{x}/{y}{r}.png",
        {
          maxZoom: 20,
          attribution: "&copy; OpenStreetMap",
        },
      ).addTo(map);

      const pickup = L.marker([12.9716, 77.5946])
        .addTo(map)
        .bindPopup("Pickup");

      const destination = L.marker([12.9352, 77.6245])
        .addTo(map)
        .bindPopup("Airport");
      const control = L.Routing.control({
        show: false,
        showAlternatives: false,
        waypoints: [L.latLng(12.9716, 77.5946), L.latLng(12.9352, 77.6245)],

        lineOptions: {
          styles: [
            {
              color: "#D4AF37",
              weight: 10,
              opacity: 0.95,
            },
          ],
        },

        routeWhileDragging: false,

        draggableWaypoints: false,

        addWaypoints: false,

        createMarker: function (i, wp) {
          return L.marker(wp.latLng);
        },
      }).addTo(map);
      const car = L.marker([12.9716, 77.5946]).addTo(map);

      const points = [
        [12.9716, 77.5946],

        [12.968, 77.598],

        [12.962, 77.604],

        [12.956, 77.612],

        [12.95, 77.618],

        [12.9352, 77.6245],
      ];

      let i = 0;

      setInterval(() => {
        if (i < points.length) {
          car.setLatLng(points[i]);

          i++;
        }
      }, 2000);
    </script>
  </body>
</html>
