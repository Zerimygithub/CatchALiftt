<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CatchALiftt Onboarding</title>

    <!-- GOOGLE FONT -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/animations.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
  </head>

  <body>
    <!-- BACKGROUND -->

    <div class="onboarding-bg"></div>

    <!-- MAIN -->

    <main class="onboarding-container">
      <!-- LEFT -->

      <section class="onboarding-left">
        <div class="small-logo">CatchA<span>Liftt</span></div>

        <h1>
          Move smarter.<br />
          Travel better.
        </h1>

        <p>Smart urban commuting powered by trusted community rides.</p>

        <div class="onboarding-progress">
          <div class="progress active"></div>
          <div class="progress"></div>
          <div class="progress"></div>
        </div>
      </section>

      <!-- RIGHT -->

      <section class="onboarding-right">
        <div class="glass-panel">
          <h2>Create Account</h2>

          <p class="panel-text">Start your premium commute journey.</p>

          <!-- FORM -->

          <form class="signup-form">
            <input type="text" placeholder="Full Name" />

            <input type="email" placeholder="Email Address" />

            <input type="tel" placeholder="Phone Number" />

            <input type="password" placeholder="Password" />

            <button type="submit" class="create-btn">Continue</button>
          </form>

          <div class="bottom-text">
            Already have an account?

            <span> Sign In </span>
          </div>
        </div>
      </section>
    </main>

    <script src="../js/main.js"></script>
  </body>
</html>
