<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Review Host | CatchALift</title>

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/review.css" />
  </head>

  <body>
    <main class="review-page">
      <div class="review-header">
        <div class="host-avatar">👨</div>

        <h1>How was your ride?</h1>

        <p>Your feedback helps improve the CatchALiftt community.</p>
      </div>

      <section class="review-card">
        <h2>Rate Your Host</h2>

        <div class="rating-stars">
          <span class="star">★</span>
          <span class="star">★</span>
          <span class="star">★</span>
          <span class="star">★</span>
          <span class="star">★</span>
        </div>

        <textarea placeholder="Share your experience..." class="review-text">
        </textarea>

        <button class="submit-review-btn">Submit Review</button>
      </section>
    </main>

    <script src="../js/review.js"></script>
  </body>
</html>
