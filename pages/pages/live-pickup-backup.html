<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Live Pickup | CatchALift</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="../css/live-pickup.css" />
  </head>

  <body>
    <div class="pickup-page">
      <div class="map-area">
        <div id="liveMap"></div>
        <div class="map-overlay"></div>
        <div class="top-status">
          <div class="live-pill">🟢 Live Pickup</div>

          <div class="eta-pill" id="etaText">4 min away</div>
        </div>
        <!-- =========================================
Navigation Canvas
========================================= -->

        <div class="host-card">
          <div class="host-left">
            <div class="driver-photo" id="driverAvatar">AV</div>

            <div>
              <h3 id="driverName">Loading...</h3>
              <p id="driverVehicle">Loading...</p>

              <div class="driver-meta">
                <span>✓ Verified Host</span>
                <span>1200+ Trips</span>
              </div>
            </div>
          </div>
        </div>

        <div class="pickup-card">
          <div class="route">
            <div class="point pickup"></div>

            <div class="route-line">
              <div id="routeProgress"></div>
            </div>

            <div class="point drop"></div>
          </div>

          <div class="route-details">
            <div>
              <span>Pickup</span>
              <h4 id="pickupLocation">Loading...</h4>
            </div>

            <div>
              <span>Drop</span>
              <h4 id="dropLocation">Loading...</h4>
            </div>
          </div>
        </div>
      </div>

      <div class="bottom-panel">
        <div class="stats-grid">
          <div class="stat-card">
            <h3>4 min</h3>
            <p>Arrival</p>
          </div>

          <div class="stat-card">
            <h3>12.4 km</h3>
            <p>Distance</p>
          </div>

          <div class="stat-card">
            <h3 id="rideFare">₹0</h3>
            <p>Fare</p>
          </div>
        </div>

        <div class="otp-box">
          <div class="ride-progress">
            <div class="step" id="step1">
              <div class="dot"></div>

              <span>Accepted</span>
            </div>

            <div class="step" id="step2">
              <div class="dot"></div>

              <span>En Route</span>
            </div>

            <div class="step" id="step3">
              <div class="dot"></div>

              <span>Arriving</span>
            </div>

            <div class="step" id="step4">
              <div class="dot"></div>

              <span>Pickup</span>
            </div>
          </div>
          <div>
            <span>Pickup OTP</span>
            <h2>4832</h2>
          </div>

          <button class="share-btn">Share Ride</button>
        </div>

        <div class="action-buttons">
          <button class="outline-btn">Cancel Ride</button>

          <button class="primary-btn">Track Host</button>
        </div>
      </div>
    </div>

    <div id="toastContainer"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../js/live-pickup.js"></script>
  </body>
</html>
