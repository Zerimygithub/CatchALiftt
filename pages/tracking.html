<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CatchALiftt Tracking</title>

    <link rel="stylesheet" href="../css/tracking.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script
      src="https://kit.fontawesome.com/a2d9d5a64f.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <div class="tracking-page">
      <!-- NAVBAR -->

      <nav class="navbar">
        <div class="logo">CatchA<span>Liftt</span></div>

        <div class="nav-right">
          <button class="nav-btn">
            <i class="fa-solid fa-bell"></i>
          </button>

          <button class="nav-btn">
            <i class="fa-solid fa-bars"></i>
          </button>
        </div>
      </nav>

      <!-- HERO -->

      <section class="tracking-hero">
        <img src="../assets/images/map.jpg" class="map-bg" />

        <!-- ROUTE -->

        <svg class="route-svg" viewBox="0 0 1200 600">
          <path
            id="routePath"
            d="M120 500 C 250 450, 320 300, 480 320 S 720 500, 950 220"
            stroke="#d7a326"
            stroke-width="10"
            fill="none"
            stroke-linecap="round"
            stroke-dasharray="18 18"
          />
        </svg>

        <!-- MOVING CARS -->

        <img src="../assets/images/car1.png" class="car car1" />
        <img src="../assets/images/car2.png" class="car car2" />
        <img src="../assets/images/car3.png" class="car car3" />
        <img src="../assets/images/car4.png" class="car car4" />

        <!-- ETA -->

        <div class="eta-card glass">
          <h3>En route</h3>

          <i class="fa-solid fa-hourglass-half"></i>

          <p>4 minutes away</p>
        </div>
      </section>

      <!-- DRIVER CARD -->

      <section class="driver-card glass">
        <div class="driver-left">
          <img src="../assets/images/car2.png" class="driver-car" />

          <div>
            <h2>TED MOE</h2>

            <div class="verified">
              <i class="fa-solid fa-shield"></i>
              Host Verified
            </div>

            <div class="ride-info">120 Rides ★ 4.9</div>
          </div>
        </div>

        <div class="driver-right">
          <img src="../assets/images/host-avatar.png" class="host-avatar" />

          <button class="call-btn">
            <i class="fa-solid fa-phone"></i>
            Call Driver
          </button>
        </div>
      </section>

      <!-- LOCATION -->

      <section class="location-card glass">
        <div class="location-line">
          <div class="gold-dot"></div>

          <div class="line"></div>

          <div class="black-dot"></div>
        </div>

        <div class="location-details">
          <div>
            <small>Pickup Location</small>

            <h4>MG Road, Gurgaon</h4>
          </div>

          <div>
            <small>Drop Location</small>

            <h4>Cyber Hub, DLF Phase 2</h4>
          </div>
        </div>

        <div class="ride-fare">
          <small>Fare</small>

          <h2>₹120</h2>
        </div>
      </section>
      <div class="ride-status">Driver accepted your request</div>

      <!-- TIMER -->

      <section class="timer-card glass">
        <div>
          <small>Driver on the way</small>

          <p>Arriving In</p>
        </div>

        <div class="timer" id="rideTimer">04:00</div>
      </section>

      <!-- ACTIONS -->

      <section class="bottom-actions">
        <button class="action-btn light">Chat</button>

        <button
          class="action-btn gold"
          onclick="window.location.href = 'payment.html'"
        >
          Complete Ride
        </button>

        <button class="action-btn light">Report</button>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

    <script src="../js/tracking.js"></script>
  </body>
</html>
