<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CatchALiftt Host</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background: #f5f3ee;
        overflow: hidden;
      }

      .app-layout {
        display: grid;
        grid-template-columns: 620px 1fr;
        height: 100vh;
      }

      /* LEFT PANEL */

      .left-panel {
        background: #f5f3ee;
        padding: 22px;
        overflow-y: auto;
        border-right: 1px solid rgba(0, 0, 0, 0.06);
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 28px;
      }

      .menu-btn,
      .notify-btn {
        width: 52px;
        height: 52px;
        border-radius: 18px;
        border: none;
        background: white;
        font-size: 18px;
        cursor: pointer;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);
      }

      .logo {
        font-size: 28px;
        font-weight: 700;
      }

      .logo span {
        color: #d4af37;
      }

      .switch-tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 22px;
      }

      .tab {
        height: 58px;
        border-radius: 18px;
        border: none;
        font-weight: 600;
        cursor: pointer;
        font-size: 16px;
      }

      .tab-light {
        background: #ebe7df;
        color: #111;
      }

      .tab-dark {
        background: #111c37;
        color: white;
      }

      .booking-card {
        background: white;
        border-radius: 30px;
        padding: 22px;
        margin-bottom: 20px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
      }

      .field {
        margin-bottom: 18px;
      }

      .field label {
        display: block;
        margin-bottom: 10px;
        font-size: 14px;
        font-weight: 600;
        color: #777;
      }

      .field input {
        width: 100%;
        height: 62px;
        border: none;
        outline: none;
        background: #f5f3ee;
        border-radius: 18px;
        padding: 0 18px;
        font-size: 17px;
      }

      .date-time {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .publish-btn {
        width: 100%;
        height: 62px;
        border: none;
        border-radius: 18px;
        background: #d4af37;
        color: white;
        font-size: 20px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 8px;
      }

      /* RIDE CARD */

      .ride-card {
        background: white;
        border-radius: 30px;
        padding: 22px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
      }

      .ride-card h2 {
        margin-bottom: 6px;
      }

      .ride-card p {
        color: #777;
        margin-bottom: 22px;
      }

      .ride-info {
        display: flex;
        align-items: center;
        gap: 18px;
      }

      .ride-info img {
        width: 74px;
      }

      .ride-price {
        font-size: 42px;
        font-weight: 700;
        margin-bottom: 6px;
      }

      .ride-route {
        font-size: 17px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .ride-meta {
        display: flex;
        gap: 18px;
        color: #666;
        font-size: 15px;
      }

      /* MAP AREA */

      .map-area {
        position: relative;
        overflow: hidden;
      }

      .map-bg {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* LIVE CARS */

      .live-car {
        position: absolute;
        width: 42px;
        z-index: 5;
      }

      .car1 {
        top: 36%;
        right: 14%;
        animation: carMove1 14s linear infinite;
      }

      .car2 {
        top: 50%;
        right: 8%;
        animation: carMove2 17s linear infinite;
      }

      .car3 {
        top: 64%;
        right: 18%;
        animation: carMove3 13s linear infinite;
      }

      .car4 {
        top: 74%;
        right: 10%;
        animation: carMove4 15s linear infinite;
      }

      @keyframes carMove1 {
        0% {
          transform: translateX(0px);
        }

        50% {
          transform: translateX(-80px);
        }

        100% {
          transform: translateX(0px);
        }
      }

      @keyframes carMove2 {
        0% {
          transform: translateY(0px);
        }

        50% {
          transform: translateY(40px);
        }

        100% {
          transform: translateY(0px);
        }
      }

      @keyframes carMove3 {
        0% {
          transform: translateX(0px);
        }

        50% {
          transform: translateX(50px);
        }

        100% {
          transform: translateX(0px);
        }
      }

      @keyframes carMove4 {
        0% {
          transform: translateY(0px);
        }

        50% {
          transform: translateY(-35px);
        }

        100% {
          transform: translateY(0px);
        }
      }

      /* MAP CARD */

      .map-card {
        position: absolute;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        width: 88%;
        background: white;
        border-radius: 30px;
        padding: 22px 28px;
        display: flex;
        justify-content: space-between;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
      }

      .map-box span {
        color: #777;
        font-size: 14px;
        display: block;
        margin-bottom: 8px;
      }

      .map-box h3 {
        font-size: 24px;
      }
    </style>
  </head>

  <body>
    <main class="app-layout">
      <!-- LEFT -->

      <section class="left-panel">
        <div class="topbar">
          <button class="menu-btn">☰</button>

          <div class="logo">CatchA<span>Liftt</span></div>

          <button class="notify-btn">🔔</button>
        </div>

        <div class="switch-tabs">
          <button
            class="tab tab-light"
            onclick="window.location.href = 'traveller-booking.html'"
          >
            🧍 Traveller
          </button>

          <button class="tab tab-dark">🚘 Host</button>
        </div>

        <!-- FORM -->

        <div class="booking-card">
          <div class="field">
            <label>Starting Point</label>

            <input type="text" id="pickup" placeholder="Enter starting point" />
          </div>

          <div class="field">
            <label>Schedule Ride</label>

            <div class="date-time">
              <input type="date" id="hostDate" />

              <input type="time" id="hostTime" />
            </div>
          </div>

          <div class="field">
            <label>Destination</label>

            <input
              type="text"
              id="destination"
              placeholder="Where are you going?"
            />
          </div>

          <div class="field">
            <label>Available Seats</label>

            <input
              type="number"
              id="seats"
              placeholder="Enter available seats"
            />
          </div>

          <div class="field">
            <label>Price Per Seat</label>

            <input type="number" id="amount" placeholder="Enter amount" />
          </div>

          <button
            class="publish-btn"
            onclick="window.location.href = 'tracking.html'"
          >
            Publish Ride →
          </button>
        </div>

        <!-- RIDE CARD -->

        <div class="ride-card">
          <h2>🚘 Your Ride</h2>

          <p>Your published ride details</p>

          <div class="ride-info">
            <img src="../assets/images/car3.png" />

            <div>
              <div class="ride-price" id="ridePrice">₹--</div>

              <div class="ride-route" id="rideRoute">Waiting for route...</div>

              <div class="ride-meta">
                <span id="rideSeats"> -- Seats </span>

                <span id="rideMinutes"> -- mins </span>

                <span>⭐ 4.9</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- MAP -->

      <section class="map-area">
        <img src="../assets/images/map.jpg" class="map-bg" />

        <!-- LIVE CARS -->

        <img src="../assets/images/car1.png" class="live-car car1" />

        <img src="../assets/images/car2.png" class="live-car car2" />

        <img src="../assets/images/car3.png" class="live-car car3" />

        <img src="../assets/images/car4.png" class="live-car car4" />

        <!-- MAP CARD -->

        <div class="map-card">
          <div class="map-box">
            <span>Earnings</span>

            <h3 id="earnings">₹--</h3>
          </div>

          <div class="map-box">
            <span>Distance</span>

            <h3 id="distance">--</h3>
          </div>

          <div class="map-box">
            <span>ETA</span>

            <h3 id="eta">--</h3>
          </div>
        </div>
      </section>
    </main>

    <script>
      /* DATE RESTRICTION */

      const today = new Date();

      const yyyy = today.getFullYear();

      const mm = String(today.getMonth() + 1).padStart(2, "0");

      const dd = String(today.getDate()).padStart(2, "0");

      const minDate = `${yyyy}-${mm}-${dd}`;

      document.getElementById("hostDate").min = minDate;

      /* PUBLISH BUTTON */

      document.getElementById("publishRide").addEventListener("click", () => {
        const pickup = document.getElementById("pickup").value;

        const destination = document.getElementById("destination").value;

        const seats = document.getElementById("seats").value;

        const amount = document.getElementById("amount").value;

        if (
          pickup === "" ||
          destination === "" ||
          seats === "" ||
          amount === ""
        ) {
          alert("Please fill all details");
          return;
        }

        const eta = Math.floor(Math.random() * 30) + 15;

        const distance = (Math.random() * 12 + 3).toFixed(1);

        const earnings = seats * amount;

        document.getElementById("ridePrice").innerText = `₹${amount}`;

        document.getElementById("rideRoute").innerText =
          `${pickup} → ${destination}`;

        document.getElementById("rideSeats").innerText = `${seats} Seats`;

        document.getElementById("rideMinutes").innerText = `${eta} mins`;

        document.getElementById("earnings").innerText = `₹${earnings}`;

        document.getElementById("distance").innerText = `${distance} km`;

        document.getElementById("eta").innerText = `${eta} mins`;
      });
    </script>
  </body>
</html>
